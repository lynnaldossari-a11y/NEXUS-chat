<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Social | Real-time Update</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --nexus-purple: #7F77DD; --bg: #0b0b0e; --card: #15151a; --text: #ffffff; 
            --border: rgba(255,255,255,0.08); --msg-me: #7F77DD; --msg-other: #23232b; 
            --glass: rgba(255, 255, 255, 0.02); --admin-gold: #ffcc00; --error: #ff4444;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .auth-container { text-align: center; background: var(--card); padding: 3rem; border-radius: 30px; border: 1px solid var(--border); max-width: 400px; }
        .auth-container h1 { margin: 0 0 2rem 0; color: var(--nexus-purple); }
        .auth-container input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: white; }
        .auth-container button { width: 100%; padding: 14px; background: var(--nexus-purple); border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .auth-container button:hover { opacity: 0.9; }
        .auth-container .error-msg { color: var(--error); font-size: 12px; margin-top: 10px; }

        #chat-interface { display: none; width: 95%; height: 92vh; max-width: 1300px; background: var(--card); border-radius: 28px; border: 1px solid var(--border); overflow: hidden; flex-direction: row; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        
        #sidebar { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--glass); }
        #sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .user-badge { display: flex; align-items: center; gap: 8px; cursor: pointer; flex: 1; }
        .user-badge img { width: 36px; height: 36px; border-radius: 8px; }
        .user-badge strong { font-size: 13px; }
        .profile-btn { background: none; border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; cursor: pointer; color: var(--text); }
        
        #room-list { flex: 1; overflow-y: auto; padding-top: 10px; }
        .room-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; border-left: 4px solid transparent; }
        .room-item:hover { background: var(--glass); }
        .room-item.active { background: rgba(127,119,221,0.1); border-left-color: var(--nexus-purple); }
        .sidebar-pfp { width: 36px; height: 36px; border-radius: 12px; object-fit: cover; background: #222; }
        
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #current-room-name { font-weight: bold; font-size: 16px; }
        #msg-list { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        #msg-list::-webkit-scrollbar { width: 8px; }
        #msg-list::-webkit-scrollbar-thumb { background: var(--nexus-purple); border-radius: 4px; }

        .avatar { width: 40px; height: 40px; border-radius: 14px; object-fit: cover; }
        .msg-wrapper { display: flex; gap: 12px; max-width: 80%; animation: slideIn 0.3s ease; }
        .msg-wrapper.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .me .msg { background: var(--nexus-purple); color: white; border-bottom-right-radius: 4px; }
        .other .msg { background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .msg.voice-msg { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .voice-player { display: flex; align-items: center; gap: 8px; }
        .voice-player button { background: none; border: none; color: white; cursor: pointer; font-size: 18px; padding: 0; width: 24px; height: 24px; }
        .voice-player progress { width: 100px; height: 4px; accent-color: var(--nexus-purple); }

        .author-name { font-size: 12px; color: var(--nexus-purple); font-weight: 600; margin-bottom: 4px; }
        .msg-wrapper.me .author-name { text-align: right; }

        .sticker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .sticker-item { width: 100%; aspect-ratio: 1; background: var(--glass); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 32px; transition: 0.2s; }
        .sticker-item:hover { background: rgba(127, 119, 221, 0.2); transform: scale(1.05); }
        .sticker-item.admin-badge { border-color: var(--admin-gold); }

        .sticker-msg { padding: 8px; background: none; border: none; font-size: 48px; cursor: pointer; }
        .sticker-msg:hover { transform: scale(1.2); }

        #sticker-panel { display: none; margin-top: 10px; background: var(--glass); border-radius: 10px; padding: 10px; border: 1px solid var(--border); max-height: 200px; overflow-y: auto; }
        #sticker-panel.active { display: block; }

        #msg-input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        #msg-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: white; max-height: 100px; resize: none; }
        .input-controls { display: flex; gap: 8px; }
        .input-controls button { padding: 12px 24px; background: var(--nexus-purple); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .input-controls button:hover { opacity: 0.9; }
        .input-controls button:disabled { opacity: 0.5; cursor: not-allowed; }
        .voice-recording { background: var(--error); animation: pulse 1s infinite; }
        
        .admin-btn { color: var(--admin-gold); background: none; border: 1px solid var(--admin-gold); padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .admin-btn:hover { background: rgba(255, 204, 0, 0.1); }

        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content h2 { margin-top: 0; color: var(--nexus-purple); }
        .modal-content label { display: block; margin: 15px 0 5px 0; font-weight: bold; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: white; }
        .modal-content textarea { resize: vertical; min-height: 80px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-buttons button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .modal-buttons .cancel { background: var(--msg-other); color: white; }
        .modal-buttons .save { background: var(--nexus-purple); color: white; }

        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; align-items: center; }
        .typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background: var(--text); animation: typing 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { opacity: 0.5; } 30% { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); } 50% { box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); } }

        .status-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; margin-left: 5px; }
    </style>
</head>
<body>

<!-- Auth Container -->
<div id="auth-container" class="auth-container">
    <h1>NEXUS</h1>
    <div style="color: #888; font-size: 12px; margin-bottom: 20px;">Social Chat Platform</div>
    <input type="text" id="username" placeholder="Username" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button onclick="handleAuth()">Login / Register</button>
    <div id="auth-error" class="error-msg"></div>
</div>

<!-- Chat Interface -->
<div id="chat-interface">
    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebar-header">
            <div class="user-badge" onclick="openProfileModal()">
                <img id="user-pfp-badge" src="" alt="">
                <strong id="user-name-badge"></strong>
            </div>
            <button class="profile-btn" onclick="openProfileModal()">👤</button>
        </div>
        <div style="padding: 15px; border-bottom: 1px solid var(--border);">
            <input type="text" id="user-search" placeholder="Search user..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--glass); color: white; font-size: 13px;">
            <button onclick="startPrivateChat()" style="width: 100%; margin-top: 8px; padding: 8px; background: var(--nexus-purple); border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 12px;">+ New Chat</button>
        </div>
        <div id="room-list">
            <div class="room-item active" id="room-global" onclick="switchRoom('global', 'Global Chat')">
                <div class="sidebar-pfp" style="display:flex; align-items:center; justify-content:center; font-weight:bold; background: var(--nexus-purple);">#</div>
                <strong>Global Nexus</strong>
            </div>
        </div>
    </div>

    <!-- Main Chat -->
    <div id="main-chat">
        <div id="chat-header">
            <div>
                <strong id="current-room-name">Global Chat</strong>
                <span id="room-status" class="status-indicator"></span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="admin-stickers" class="admin-btn" onclick="openStickerAdmin()" style="display:none;">🎨 Stickers</button>
                <button id="admin-wipe" class="admin-btn" onclick="confirmWipeChat()" style="display:none;">WIPE CHAT</button>
                <button onclick="logout()" style="background:none; border:1px solid var(--border); padding:5px 10px; border-radius:5px; cursor:pointer; color:var(--text);">Logout</button>
            </div>
        </div>
        <div id="msg-list"></div>
        <div id="sticker-panel"></div>
        <div id="msg-input-area">
            <textarea id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMsg(); }" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: white; max-height: 100px; resize: none;"></textarea>
            <div class="input-controls">
                <button onclick="toggleStickerPanel()" title="Send sticker">🎨</button>
                <button id="voice-btn" onclick="toggleVoiceRecording()" title="Record voice message">🎤</button>
                <button onclick="sendMsg()" title="Send message">Send</button>
            </div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h2>Profile Settings</h2>
        <label>Username</label>
        <input type="text" id="profile-username" disabled>
        <label>Display Name</label>
        <input type="text" id="profile-display-name" placeholder="Your display name">
        <label>Bio</label>
        <textarea id="profile-bio" placeholder="Tell us about yourself..."></textarea>
        <label>Profile Picture URL</label>
        <input type="url" id="profile-pfp-url" placeholder="https://...">
        <img id="profile-preview" src="" alt="Preview" style="width: 100px; height: 100px; border-radius: 12px; margin: 10px 0; display: none;">
        <div class="modal-buttons">
            <button class="cancel" onclick="closeProfileModal()">Cancel</button>
            <button class="save" onclick="saveProfile()">Save Profile</button>
        </div>
    </div>
</div>

<!-- Sticker Admin Modal -->
<div id="sticker-admin-modal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <h2>🎨 Manage Stickers</h2>
        <p style="color: #888; font-size: 12px;">Add sticker emojis or URLs. All users can use them.</p>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="sticker-input" placeholder="Enter emoji (😀) or sticker URL" style="flex: 1;">
            <button onclick="addSticker()" style="padding: 10px 20px; background: var(--nexus-purple); border: none; border-radius: 8px; color: white; cursor: pointer;">Add</button>
        </div>
        <div id="sticker-admin-list" class="sticker-grid"></div>
        <div class="modal-buttons">
            <button class="cancel" onclick="closeStickerAdmin()">Close</button>
        </div>
    </div>
</div>

<script>
    // ===== CONFIG =====
    const supabaseUrl = 'https://ztlownkhxsdoakqvwmmh.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0bG93bmtoeHNkb2FrcXZ3bW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjQ2OTUsImV4cCI6MjA5MzI0MDY5NX0.xC55EHOn611gECnMrnwBYSmgusf7E73uMYJZ6bRP0Fw';
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    // ===== STATE =====
    let sessionUser = null, currentRoom = 'global', activeSub = null;
    let mediaRecorder = null, recordedChunks = [];
    let userProfiles = {};
    let isRecording = false;
    let stickers = [];
    let stickerPanelOpen = false;

    // ===== UTILITY FUNCTIONS =====
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function getAvatarUrl(username) {
        return userProfiles[username]?.pfp_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=7F77DD&color=fff`;
    }

    async function showError(msg) {
        const el = document.getElementById('auth-error');
        el.innerText = msg;
        setTimeout(() => el.innerText = '', 5000);
    }

    // ===== AUTHENTICATION =====
    async function handleAuth() {
        try {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            
            if (!u || !p) {
                showError('Username and password required');
                return;
            }
            
            const { data: existing } = await db.from('accounts').select('*').eq('username', u).single();
            
            if (existing) {
                if (existing.password !== p) {
                    showError('Invalid password');
                    return;
                }
                sessionUser = u;
                userProfiles[u] = existing;
            } else {
                const { error } = await db.from('accounts').insert([{
                    username: u,
                    password: p,
                    display_name: u,
                    bio: '',
                    pfp_url: getAvatarUrl(u),
                    is_admin: false
                }]);
                if (error) throw error;
                sessionUser = u;
                userProfiles[u] = { username: u, display_name: u, bio: '', pfp_url: getAvatarUrl(u), is_admin: false };
            }

            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            updateUserBadge();
            if(userProfiles[u]?.is_admin) {
                document.getElementById('admin-wipe').style.display = 'block';
                document.getElementById('admin-stickers').style.display = 'block';
            }
            loadStickers();
            switchRoom('global', 'Global Chat');
            setupGlobalListener();
            
            if (Notification.permission !== 'granted') Notification.requestPermission();
        } catch (err) {
            showError('Auth error: ' + err.message);
        }
    }

    function logout() {
        if (confirm('Logout?')) {
            sessionUser = null;
            currentRoom = 'global';
            if(activeSub) db.removeChannel(activeSub);
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('chat-interface').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('msg-list').innerHTML = '';
        }
    }

    // ===== PROFILE SYSTEM =====
    async function openProfileModal() {
        document.getElementById('profile-username').value = sessionUser;
        const prof = userProfiles[sessionUser];
        document.getElementById('profile-display-name').value = prof?.display_name || '';
        document.getElementById('profile-bio').value = prof?.bio || '';
        document.getElementById('profile-pfp-url').value = prof?.pfp_url || '';
        document.getElementById('profile-preview').style.display = 'none';
        document.getElementById('profile-modal').classList.add('active');
    }

    function closeProfileModal() {
        document.getElementById('profile-modal').classList.remove('active');
    }

    async function saveProfile() {
        try {
            const display_name = document.getElementById('profile-display-name').value.trim();
            const bio = document.getElementById('profile-bio').value.trim();
            let pfp_url = document.getElementById('profile-pfp-url').value.trim();
            
            if (!display_name) {
                showError('Display name required');
                return;
            }
            
            if (!pfp_url) pfp_url = getAvatarUrl(sessionUser);
            
            const { error } = await db.from('accounts')
                .update({ display_name, bio, pfp_url })
                .eq('username', sessionUser);
            
            if (error) throw error;
            
            userProfiles[sessionUser] = { ...userProfiles[sessionUser], display_name, bio, pfp_url };
            updateUserBadge();
            closeProfileModal();
            
            document.getElementById('msg-list').innerHTML = '';
            loadMessages();
        } catch (err) {
            showError('Profile update failed: ' + err.message);
        }
    }

    function updateUserBadge() {
        const prof = userProfiles[sessionUser];
        document.getElementById('user-name-badge').innerText = prof?.display_name || sessionUser;
        document.getElementById('user-pfp-badge').src = prof?.pfp_url || getAvatarUrl(sessionUser);
    }

    // ===== MESSAGE HANDLING =====
    async function sendMsg() {
        try {
            const val = document.getElementById('msg-input').value.trim();
            if(!val) return;
            document.getElementById('msg-input').value = '';
            
            await db.from('messages').insert([{
                content: val,
                author_username: sessionUser,
                room_id: currentRoom,
                type: 'text'
            }]);
        } catch (err) {
            showError('Failed to send message: ' + err.message);
        }
    }

    async function sendVoiceMessage(audioBlob) {
        try {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Audio = e.target.result.split(',')[1];
                await db.from('messages').insert([{
                    content: base64Audio,
                    author_username: sessionUser,
                    room_id: currentRoom,
                    type: 'voice'
                }]);
            };
            reader.readAsDataURL(audioBlob);
        } catch (err) {
            showError('Failed to send voice message: ' + err.message);
        }
    }

    function toggleVoiceRecording() {
        if (!isRecording) {
            startVoiceRecording();
        } else {
            stopVoiceRecording();
        }
    }

    async function startVoiceRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            recordedChunks = [];
            
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(recordedChunks, { type: 'audio/webm' });
                await sendVoiceMessage(audioBlob);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('voice-btn').classList.add('voice-recording');
            document.getElementById('voice-btn').innerText = '🔴';
        } catch (err) {
            showError('Microphone access denied: ' + err.message);
        }
    }

    function stopVoiceRecording() {
        if (mediaRecorder) {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('voice-btn').classList.remove('voice-recording');
            document.getElementById('voice-btn').innerText = '🎤';
        }
    }

    // ===== ROOM MANAGEMENT =====
    async function switchRoom(id, name) {
        try {
            currentRoom = id;
            document.getElementById('current-room-name').innerText = name;
            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            if(document.getElementById(`room-${id}`)) document.getElementById(`room-${id}`).classList.add('active');
            loadMessages();
            setupRoomSub();
        } catch (err) {
            showError('Room switch error: ' + err.message);
        }
    }

    async function loadMessages() {
        try {
            const { data } = await db.from('messages').select('*').eq('room_id', currentRoom).order('created_at', { ascending: true });
            const list = document.getElementById('msg-list');
            list.innerHTML = '';
            if(data) {
                for(const m of data) {
                    if (!userProfiles[m.author_username]) {
                        const { data: prof } = await db.from('accounts').select('*').eq('username', m.author_username).single();
                        if (prof) userProfiles[m.author_username] = prof;
                    }
                    renderMessage(m);
                }
            }
            setTimeout(() => list.scrollTop = list.scrollHeight, 100);
        } catch (err) {
            showError('Failed to load messages: ' + err.message);
        }
    }

    function setupRoomSub() {
        if(activeSub) db.removeChannel(activeSub);
        activeSub = db.channel(currentRoom).on('postgres_changes', { 
            event: 'INSERT', 
            schema: 'public', 
            table: 'messages', 
            filter: `room_id=eq.${currentRoom}` 
        }, async (p) => {
            if (!userProfiles[p.new.author_username]) {
                const { data: prof } = await db.from('accounts').select('*').eq('username', p.new.author_username).single();
                if (prof) userProfiles[p.new.author_username] = prof;
            }
            renderMessage(p.new);
        }).subscribe();
    }

    async function renderMessage(m) {
        try {
            const side = m.author_username === sessionUser ? 'me' : 'other';
            const prof = userProfiles[m.author_username];
            const avatarUrl = prof?.pfp_url || getAvatarUrl(m.author_username);
            const displayName = prof?.display_name || m.author_username;
            
            const div = document.createElement('div');
            div.className = `msg-wrapper ${side}`;
            
            let contentHtml = '';
            if (m.type === 'voice') {
                contentHtml = `
                    <div class="msg voice-msg">
                        <div class="voice-player">
                            <button onclick="playVoice(this)">▶️</button>
                            <audio style="display:none;" data-audio="${m.content}"></audio>
                            <progress value="0" max="100"></progress>
                        </div>
                    </div>
                `;
            } else if (m.type === 'sticker') {
                // Check if sticker is a URL or emoji
                if (m.content.startsWith('http')) {
                    // Image sticker
                    contentHtml = `<div class="msg" style="padding: 0; background: none; border: none;"><img src="${escapeHtml(m.content)}" style="width: 150px; height: auto; border-radius: 10px; cursor: pointer;" onclick="copySticker(event)" title="Click to copy URL"></div>`;
                } else {
                    // Emoji or text sticker
                    contentHtml = `<div class="msg sticker-msg" onclick="copySticker(event)">${escapeHtml(m.content)}</div>`;
                }
            } else {
                contentHtml = `<div class="msg">${escapeHtml(m.content)}</div>`;
            }
            
            div.innerHTML = `
                <div style="display: flex; flex-direction: column; ${side === 'me' ? 'align-items: flex-end;' : ''}">
                    <div class="author-name">${escapeHtml(displayName)}</div>
                    <div style="display: flex; gap: 12px; align-items: flex-end; ${side === 'me' ? 'flex-direction: row-reverse;' : ''}">
                        <img class="avatar" src="${avatarUrl}" alt="${displayName}" title="${displayName}">
                        ${contentHtml}
                    </div>
                </div>
            `;
            document.getElementById('msg-list').appendChild(div);
            document.getElementById('msg-list').scrollTop = document.getElementById('msg-list').scrollHeight;
        } catch (err) {
            console.error('Render error:', err);
        }
    }

    function playVoice(btn) {
        try {
            const audio = btn.parentElement.querySelector('audio');
            const audioData = audio.dataset.audio;
            if (!audio.src) {
                audio.src = 'data:audio/webm;base64,' + audioData;
            }
            if (audio.paused) {
                audio.play();
                btn.innerText = '⏸️';
                audio.onended = () => btn.innerText = '▶️';
            } else {
                audio.pause();
                btn.innerText = '▶️';
            }
        } catch (err) {
            console.error('Playback error:', err);
        }
    }

    // ===== PRIVATE CHAT =====
    async function startPrivateChat() {
        try {
            const target = document.getElementById('user-search').value.trim();
            if(!target || target === sessionUser) {
                showError('Invalid user');
                return;
            }
            
            const { data: targetUser } = await db.from('accounts').select('*').eq('username', target).single();
            if (!targetUser) {
                showError('User not found');
                return;
            }
            
            if (!userProfiles[target]) userProfiles[target] = targetUser;
            
            const roomId = [sessionUser, target].sort().join('_');
            if(!document.getElementById(`room-${roomId}`)) {
                await addContactToSidebar(target, roomId, targetUser);
            }
            document.getElementById('user-search').value = '';
            switchRoom(roomId, `@ ${targetUser.display_name || target}`);
        } catch (err) {
            showError('Error starting chat: ' + err.message);
        }
    }

    async function addContactToSidebar(username, roomId, userProf) {
        const prof = userProf || userProfiles[username];
        const avatarUrl = prof?.pfp_url || getAvatarUrl(username);
        const displayName = prof?.display_name || username;
        
        const div = document.createElement('div');
        div.id = `room-${roomId}`;
        div.className = 'room-item';
        div.onclick = () => switchRoom(roomId, `@ ${displayName}`);
        div.innerHTML = `
            <img class="sidebar-pfp" src="${avatarUrl}" alt="${displayName}">
            <strong>${displayName}</strong>
        `;
        document.getElementById('room-list').appendChild(div);
    }

    // ===== AUTO DISCOVERY =====
    function setupGlobalListener() {
        db.channel('global-updates').on('postgres_changes', { 
            event: 'INSERT', 
            schema: 'public', 
            table: 'messages' 
        }, async (p) => {
            const msg = p.new;
            if (msg.room_id.includes(sessionUser) && msg.author_username !== sessionUser) {
                const otherUser = msg.author_username;
                if (!document.getElementById(`room-${msg.room_id}`)) {
                    const { data: prof } = await db.from('accounts').select('*').eq('username', otherUser).single();
                    if (prof) userProfiles[otherUser] = prof;
                    await addContactToSidebar(otherUser, msg.room_id, prof);
                    triggerNotification(prof?.display_name || otherUser, msg.content);
                }
            }
        }).subscribe();
    }

    function triggerNotification(user, text) {
        try {
            if (Notification.permission === "granted") {
                new Notification(`Nexus: ${user}`, { body: text.substring(0, 100) });
            }
        } catch (err) {
            console.error('Notification error:', err);
        }
    }

    // ===== ADMIN FUNCTIONS =====
    function confirmWipeChat() {
        if (confirm('⚠️ DELETE ALL MESSAGES IN THIS ROOM? This cannot be undone.')) {
            wipeChat();
        }
    }

    async function wipeChat() {
        try {
            const { error } = await db.from('messages').delete().eq('room_id', currentRoom);
            if (error) throw error;
            document.getElementById('msg-list').innerHTML = '';
        } catch (err) {
            showError('Wipe failed: ' + err.message);
        }
    }

    // ===== STICKER SYSTEM =====
    async function loadStickers() {
        try {
            const { data } = await db.from('stickers').select('*').order('created_at', { ascending: true });
            stickers = data || [];
            refreshStickerPanel();
        } catch (err) {
            console.error('Failed to load stickers:', err);
        }
    }

    function refreshStickerPanel() {
        const panel = document.getElementById('sticker-panel');
        panel.innerHTML = '';
        if (stickers.length === 0) {
            panel.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">No stickers yet</div>';
            return;
        }
        const grid = document.createElement('div');
        grid.className = 'sticker-grid';
        for (const s of stickers) {
            const item = document.createElement('div');
            item.className = 'sticker-item';
            
            // Support both emoji stickers and image stickers
            const stickerContent = s.sticker || s.url || '';
            
            if (s.url && !s.sticker) {
                // Image sticker
                const img = document.createElement('img');
                img.src = s.url;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '10px';
                item.appendChild(img);
            } else {
                // Emoji or text sticker
                item.textContent = stickerContent;
            }
            
            item.onclick = () => sendSticker(stickerContent);
            grid.appendChild(item);
        }
        panel.appendChild(grid);
    }

    function toggleStickerPanel() {
        const panel = document.getElementById('sticker-panel');
        stickerPanelOpen = !stickerPanelOpen;
        if (stickerPanelOpen) {
            panel.classList.add('active');
        } else {
            panel.classList.remove('active');
        }
    }

    async function sendSticker(sticker) {
        try {
            await db.from('messages').insert([{
                content: sticker,
                author_username: sessionUser,
                room_id: currentRoom,
                type: 'sticker'
            }]);
            document.getElementById('sticker-panel').classList.remove('active');
            stickerPanelOpen = false;
        } catch (err) {
            showError('Failed to send sticker: ' + err.message);
        }
    }

    function copySticker(e) {
        const sticker = e.target.textContent;
        navigator.clipboard.writeText(sticker);
    }

    function openStickerAdmin() {
        document.getElementById('sticker-admin-modal').classList.add('active');
        refreshStickerAdminList();
    }

    function closeStickerAdmin() {
        document.getElementById('sticker-admin-modal').classList.remove('active');
    }

    function refreshStickerAdminList() {
        const list = document.getElementById('sticker-admin-list');
        list.innerHTML = '';
        for (const s of stickers) {
            const item = document.createElement('div');
            item.className = 'sticker-item admin-badge';
            item.style.position = 'relative';
            
            const stickerContent = s.sticker || s.url || '';
            
            if (s.url && !s.sticker) {
                // Image sticker - display thumbnail
                const img = document.createElement('img');
                img.src = s.url;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '10px';
                item.appendChild(img);
            } else {
                // Emoji or text sticker
                const span = document.createElement('span');
                span.style.fontSize = '24px';
                span.textContent = stickerContent;
                const wrapper = document.createElement('div');
                wrapper.style.position = 'absolute';
                wrapper.style.display = 'flex';
                wrapper.style.gap = '5px';
                wrapper.appendChild(span);
                item.appendChild(wrapper);
            }
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '✕';
            deleteBtn.onclick = () => deleteSticker(s.id);
            deleteBtn.style.position = 'absolute';
            deleteBtn.style.top = '5px';
            deleteBtn.style.right = '5px';
            deleteBtn.style.background = 'var(--error)';
            deleteBtn.style.border = 'none';
            deleteBtn.style.color = 'white';
            deleteBtn.style.borderRadius = '50%';
            deleteBtn.style.width = '24px';
            deleteBtn.style.height = '24px';
            deleteBtn.style.cursor = 'pointer';
            deleteBtn.style.padding = '0';
            deleteBtn.style.fontSize = '12px';
            
            item.appendChild(deleteBtn);
            list.appendChild(item);
        }
    }

    async function addSticker() {
        try {
            const input = document.getElementById('sticker-input');
            const stickerText = input.value.trim();
            
            if (!stickerText) {
                showError('Enter a sticker');
                return;
            }

            const { error } = await db.from('stickers').insert([{
                sticker: stickerText,
                added_by: sessionUser
            }]);

            if (error) throw error;

            input.value = '';
            await loadStickers();
            refreshStickerAdminList();
        } catch (err) {
            showError('Failed to add sticker: ' + err.message);
        }
    }

    async function deleteSticker(stickerIdParam) {
        if (!confirm('Delete this sticker?')) return;
        
        try {
            const { error } = await db.from('stickers').delete().eq('id', stickerIdParam);
            if (error) throw error;
            await loadStickers();
            refreshStickerAdminList();
        } catch (err) {
            showError('Failed to delete sticker: ' + err.message);
        }
    }
</script>
</body>
</html>
